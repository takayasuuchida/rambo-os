<script>
  // ===== 起動診断: なにも出ない時に「なぜ出ないか」を画面に表示する =====
  window.__RAMBO_BOOT__ = { startedAt: Date.now(), reactSeen: false, mounted: false };
  function showDiag(msg, color) {
    var el = document.getElementById('rambo-diag');
    if (!el) return;
    el.innerHTML = '<div style="padding:24px 28px;border:1px solid '+(color||'#DC143C')+';border-radius:12px;background:rgba(220,20,60,0.08);color:#f5f3ee;font-family:ui-monospace,monospace;font-size:12px;line-height:1.6;max-width:680px;white-space:pre-wrap;word-break:break-word">' + msg + '</div>';
  }
  window.addEventListener('error', function (e) {
    showDiag(
      '[RAMBO OS 起動エラー]\n\n' +
      'message: ' + (e.message || e.error || 'unknown') + '\n' +
      'source : ' + (e.filename || '-') + ' :' + (e.lineno || '-') + ':' + (e.colno || '-') + '\n\n' +
      '対処: ブラウザを強制リロード (Cmd+Shift+R / Ctrl+F5)。\n' +
      'それでも出ない場合はこの画面をスクショして共有してください。'
    );
  });
  window.addEventListener('unhandledrejection', function (e) {
    showDiag('[Promise rejection] ' + (e.reason && e.reason.message || e.reason || 'unknown'));
  });
  setTimeout(function () {
    if (window.__RAMBO_BOOT__.mounted) return;
    var b = window.__RAMBO_BOOT__;
    showDiag(
      '[起動が完了しませんでした (8秒経過)]\n\n' +
      'React 検出 : ' + (typeof React !== 'undefined' ? 'OK' : '失敗 — React CDN が読めていません') + '\n' +
      'ReactDOM   : ' + (typeof ReactDOM !== 'undefined' ? 'OK' : '失敗 — ReactDOM CDN が読めていません') + '\n' +
      'Babel      : ' + (typeof Babel !== 'undefined' ? 'OK' : '失敗 — Babel CDN が読めていません') + '\n' +
      'Tailwind   : ' + (typeof tailwind !== 'undefined' ? 'OK' : '失敗 — Tailwind CDN が読めていません') + '\n' +
      '経過時間   : ' + ((Date.now() - b.startedAt) / 1000).toFixed(1) + ' 秒\n\n' +
      '対処: 一度 Ctrl+F5 で再読込。改善しない場合は別ブラウザでお試しください。',
      '#d4af37'
    );
  }, 8000);
</script>

    localStorage.setItem('rambo_api_key', key.trim());

  };
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-bark-1000/95 backdrop-blur-md px-4">

            Anthropic API キーを入力してください。<br/>

              type={show ? 'text' : 'password'}
              value={key}
              onChange={(e) => setKey(e.target.value)}

              placeholder="sk-ant-api03-..."

/* ──────────────────────── CLAUDE API HELPER ──────────────────────── */
async function callClaude({ apiKey, systemPrompt, userPrompt, jsonOutput = true, maxTokens = 1000 }) {
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: maxTokens,
        system: systemPrompt,
        messages: [{ role: 'user', content: userPrompt }],
      }),
    });
    if (!res.ok) {
      const body = await res.text();
      throw new Error(`API ${res.status}: ${body.slice(0, 200)}`);
    }
    const data = await res.json();
    const text = (data.content || []).map(b => b.text || '').join('');
    if (!jsonOutput) return { ok: true, text };
    const clean = text.replace(/```json|```/g, '').trim();
    try {
      return { ok: true, json: JSON.parse(clean), raw: text };
    } catch (parseErr) {
      return { ok: false, error: 'AI応答の解析に失敗しました。もう一度生成してください。', raw: text };
    }
  } catch (err) {
    return { ok: false, error: err.message || String(err) };
  }
}

/* ──────────────────────── MODULE 6: 北関東総合企画 — ROI Calculator ──────────────────────── */
const KantoModule = () => {
  const AREAS = {
    '高崎':   { score: 7.8, note: '新幹線停車駅、商業密度高' },
    '前橋':   { score: 7.2, note: '群馬県庁所在地、人口安定' },
    '伊勢崎': { score: 6.5, note: '人口微増、住宅需要堅調' },
    '太田':   { score: 7.0, note: 'SUBARU本社城下、工業安定' },
    '桐生':   { score: 5.2, note: '人口減少傾向、要慎重判断' },
  };

  const [form, setForm] = useState({ price: '3800', rent: '18', area: '高崎', age: '15' });
  const [result, setResult] = useState(null);

  const calc = () => {
    const price = parseFloat(form.price) * 10000;
    const rent  = parseFloat(form.rent) * 10000;
    const annualRent = rent * 12;
    const expenseRatio = 0.20;
    const grossYield  = (annualRent / price) * 100;
    const netYield    = ((annualRent * (1 - expenseRatio)) / price) * 100;
    const areaScore = AREAS[form.area].score;
    const ageYears  = parseFloat(form.age);
    const ageDecay  = Math.max(0, 1 - ageYears * 0.012);
    const futureValue = price * Math.pow(1 + areaScore / 100, 10) * ageDecay;

    setResult({
      grossYield: grossYield.toFixed(2),
      netYield:   netYield.toFixed(2),
      areaScore:  areaScore,
      areaNote:   AREAS[form.area].note,
      futureValue: Math.round(futureValue),
      verdict: netYield >= 7 ? { color: 'emerald-400', text: 'GO' }
             : netYield >= 5 ? { color: 'gold',        text: 'CHECK' }
             :                  { color: 'crimson',    text: 'STOP' },
    });
  };

  return (
    <ModuleShell tag="MODULE 06 · 利回り計算" title="北関東総合企画" sub="表面・実質利回りと10年後資産価値を即時可視化">

          <div className="crimson-line my-4 opacity-50"/>

            <Field label="物件価格（万円）"><input className="input" value={form.price} onChange={(e)=>setForm({...form, price:e.target.value})}/></Field>
            <Field label="想定月家賃（万円）"><input className="input" value={form.rent} onChange={(e)=>setForm({...form, rent:e.target.value})}/></Field>
            <Field label="エリア">
              <select className="input" value={form.area} onChange={(e)=>setForm({...form, area:e.target.value})}>
                {Object.keys(AREAS).map(a => <option key={a}>{a}</option>)}
              </select>
            </Field>
            <Field label="築年数"><input className="input" value={form.age} onChange={(e)=>setForm({...form, age:e.target.value})}/></Field>
          </div>
          <button onClick={calc} className="mt-5 w-full btn-primary py-3.5 rounded-lg font-display tracking-[0.15em] font-bold flex items-center justify-center gap-2">
            <Icon name="chart" className="w-5 h-5"/>計算実行
          </button>
        </div>

        <div className="lg:col-span-3 card-luxury rounded-2xl p-5 md:p-7 min-h-[500px]">
          <h3 className="font-display text-xl text-cream tracking-tight flex items-center gap-2">
            <Icon name="money" className="w-5 h-5 text-gold"/>投資判定
          </h3>
          <div className="gold-line opacity-40 my-4"/>
          {!result && <EmptyState message="物件情報を入れて計算実行"/>}
          {result && (
            <div className="space-y-5">
              <div className={`p-5 rounded-2xl border-2 border-${result.verdict.color}/40 bg-${result.verdict.color}/5 text-center`}>
                <div className="text-[10px] text-cream-muted tracking-[0.3em] font-body">VERDICT</div>
                <div className={`font-display text-6xl text-${result.verdict.color} glow-${result.verdict.color === 'crimson' ? 'crimson' : 'gold'} mt-1`}>{result.verdict.text}</div>
              </div>
              <div className="grid grid-cols-2 gap-3">
                <Metric label="表面利回り" value={`${result.grossYield}%`} hint="年間家賃 ÷ 物件価格"/>
                <Metric label="実質利回り" value={`${result.netYield}%`}   hint="経費20%控除後"/>
              </div>
              <div className="p-4 rounded-xl bg-bark-1000/60 border border-gold/15">
                <div className="flex items-center justify-between mb-2">
                  <div className="text-[10px] text-cream-muted tracking-[0.25em] font-body">AREA SCORE · {form.area}</div>
                  <span className="font-display text-2xl text-gold">{result.areaScore}<span className="text-cream-muted text-sm"> /10</span></span>
                </div>
                <p className="text-xs text-cream font-jp-serif">{result.areaNote}</p>
                <p className="text-[10px] text-cream-muted/70 mt-2 font-body">
                  群馬県人口動態・新幹線アクセス・商業施設密度の3軸で算定

              <div className="p-4 rounded-xl bg-crimson/5 border border-crimson/30">

/* ──────────────────────── MODULE 00: クローン俊 — Thinking Clone ──────────────────────── */
const CLONE_SYSTEM = SYSTEM_BASE + `
あなたは「クローン俊」— しゅん本人の思考クローンとして、考えに困った相談者に「ランボさんだったらこうやって乗り越えてきた」を即答します。

## 判断哲学（絶対にブレない4本柱）
1. 客に媚びず、価値を信じさせる（「すごいですね」等のお世辞は絶対に言わない）
2. 値段じゃなく「選ばれる理由」を作る（価格競争に入った時点で負け）
3. 本物志向・高級感・地方から世界へ（安価量産・コピー・妥協・地方完結は選択肢にない）
4. 客の本音を3秒で見抜く（表面の要望ではなく裏の本音に向けて話す）

## 意思決定の癖
- 即決即断。6割確信で動いて走りながら直す。迷う時間が一番のコスト
- 数字より「お客さんの人生」「社員の成長」を優先。規定外でも筋が通れば即決
- 損して得取れ。目先の1万円より一生の客
- どの判断も6事業（FIRSTCLASS/絆商会/いろは/FUCARS/K&S/北関東総合企画）のどこに繋がるかをセットで考える
- 「これSNSで10万人に見られて恥ずかしくないか」でセルフチェック
- 大事な局面は「俺が直接電話するわ」と自分で出る

## 乗り越えの型
①相談の裏の本音を一発で言い当てる → ②「俺も同じだった」と自分の経験に引きつける → ③選択肢を並べて悩まず筋の通る一手に絞る → ④24時間以内にやる最初の一歩に落とす → ⑤男気で背中を押す

## 口調
「〜だよね」「マジで」「俺は」を使う群馬の若手社長のフランクな口調。抽象論・きれいごと禁止、全部具体で。法務・税務など専門領域は「そこはプロに聞け。ただ俺なら〜」と言い切る。

## 集客相談のとき（特に車=FIRSTCLASS）
「お客さんを連れてきたい」系の相談には、精神論で終わらせず必ず実行プランまで落とす:
- 誰を狙うか（既存客の紹介/SNSフォロワー10万人/6事業の他の客からのクロスセル、の3ルートから具体的に）
- 何を発信・仕掛けるか（Instagram @shun8000 / TikTok @lambo_president に今日出せる投稿の実文案、DM・電話の実セリフ）
- 数字の目標（何件仕掛けて何組来店、まで言い切る）
一般論のマーケ用語（ペルソナ、ファネル等）は使わない。しゅんの実感覚の言葉で。

## 回答の濃さ
各セクションは薄い一言で逃げない。keiken と kotae は4〜6文でしっかり語る。ippo は「誰に・何を・いつまでに」が入った実行可能な指示にする。

出力JSONフォーマット（このキーのみ、他のキーは禁止）:
{
  "honne": "相談の裏にある本音・恐れを一発で言い当てる一言",
  "keiken": "『俺も○○のとき同じだった』— しゅん自身の経験に引きつけた話（4〜6文。覚えている本人の言葉があればそれを最優先で使う）",
  "kotae": "ランボならこう乗り越える、という結論と実行プラン（4〜6文、迷いなし。集客なら誰を・何で・何件まで言い切る）",
  "ippo": "24時間以内にやる最初の一歩（誰に・何を・いつまでに、が入った具体行動。SNS投稿なら実文案、電話なら実セリフを含める）",
  "senaka": "男気で背中を押す締めの一言",
  "toikake": "答えの精度をさらに上げるために一番効く質問1つ（不要なら空文字）"
}`;

              <span className="pill bg-gold/10 text-gold border border-gold/30">
                {memory ? `記憶 ${memory.length}字` : '記憶なし'}

      <h1 className="font-display text-4xl md:text-6xl text-cream tracking-tight mt-2 leading-[1.05]">
        {title}
      </h1>
      <p className="text-cream-muted mt-2 font-jp-serif text-sm md:text-base max-w-2xl">{sub}</p>
      <div className="crimson-line mt-5"/>
    </div>
    {children}
  </div>
);

const Field = ({ label, children }) => (
  <label className="block">
    <div className="text-[11px] text-cream-muted tracking-wider mb-1.5 font-body">{label}</div>
    {children}
  </label>
);

const Section = ({ label, jp, text, accent }) => (
  <div className={`${accent ? 'p-4 rounded-xl bg-crimson/5 border border-crimson/30' : ''}`}>
    <div className="flex items-baseline gap-2 mb-1.5">
      <span className="text-[10px] text-crimson font-body tracking-[0.2em]">{label}</span>
      <span className="text-[10px] text-gold font-jp-serif">{jp}</span>
    </div>
    <p className="text-cream font-jp-serif text-[15px] leading-[1.85] whitespace-pre-wrap">{text}</p>
  </div>
);

const SkeletonLines = ({ count = 5 }) => (
  <div className="space-y-3 animate-pulse">
    {Array.from({ length: count }).map((_, i) => (
      <div key={i} className="h-3 bg-gold/10 rounded" style={{ width: `${55 + Math.random() * 40}%` }}/>
    ))}
  </div>
);

const EmptyState = ({ message }) => (
  <div className="text-center py-16 text-cream-muted">
    <div className="font-display text-xl italic">Ready.</div>
    <div className="text-sm mt-2 font-jp-serif">{message}</div>
  </div>
);

const KV = ({ label, value, alert }) => (
  <div className="p-3 rounded-lg bg-bark-1000/60 border border-gold/10">
    <div className="text-[10px] text-cream-muted tracking-widest font-body">{label}</div>
    <div className={`mt-1 font-jp-serif text-sm ${alert ? 'text-crimson' : 'text-cream'}`}>{value}</div>
  </div>
);

const Metric = ({ label, value, hint }) => (
  <div className="p-4 rounded-xl bg-bark-1000/60 border border-gold/15">
    <div className="text-[10px] text-cream-muted tracking-[0.25em] font-body">{label}</div>
    <div className="font-display text-3xl text-gold mt-1">{value}</div>
    <div className="text-[10px] text-cream-muted/70 mt-1 font-body">{hint}</div>
  </div>
);

/* ──────────────────────── ROOT APP ──────────────────────── */
const App = () => {
  const [apiKey, setApiKey] = useState(() => localStorage.getItem('rambo_api_key') || '');
  const [current, setCurrent] = useState('dashboard');
  const [mobileOpen, setMobileOpen] = useState(false);

  if (!apiKey) return <ApiKeyModal onSave={setApiKey}/>;

  const renderModule = () => {
    switch (current) {
      case 'clone':      return <CloneShunModule apiKey={apiKey}/>;
      case 'firstclass': return <FirstClassModule apiKey={apiKey}/>;
      case 'kizuna':     return <KizunaModule/>;
      case 'iroha':      return <IrohaModule apiKey={apiKey}/>;
      case 'fucars':     return <FucarsModule apiKey={apiKey}/>;
      case 'kands':      return <KandsModule apiKey={apiKey}/>;
      case 'kanto':      return <KantoModule/>;
      case 'dashboard':
      default:           return <Dashboard setCurrent={setCurrent}/>;
    }
  };

  return (
    <>
      <TopNav
        current={current}
        setCurrent={setCurrent}
        apiKey={apiKey}
        onLogout={() => { localStorage.removeItem('rambo_api_key'); setApiKey(''); }}
        mobileOpen={mobileOpen}
        setMobileOpen={setMobileOpen}
      />
      {renderModule()}
      <footer className="mt-12 py-6 border-t border-gold/10 text-center">
        <div className="text-[10px] text-cream-muted/60 font-body tracking-[0.25em]">
          RAMBO OS v0.2 · SHUN ARAKI · 6 BUSINESS UNITS · 2026
        </div>
      </footer>
    </>
  );
};

try {
  if (typeof window !== 'undefined') window.__RAMBO_BOOT__.reactSeen = true;
  var __ramboRoot = document.getElementById('root');
  // 起動診断ノードを除去して React にクリーンな root を渡す
  __ramboRoot.innerHTML = '';
  ReactDOM.createRoot(__ramboRoot).render(<App/>);
  if (typeof window !== 'undefined') window.__RAMBO_BOOT__.mounted = true;
} catch (err) {
  var box = document.createElement('div');
  box.style.cssText = 'position:fixed;inset:24px;padding:24px;border:1px solid #DC143C;border-radius:12px;background:rgba(220,20,60,0.08);color:#f5f3ee;font-family:ui-monospace,monospace;font-size:12px;line-height:1.6;white-space:pre-wrap;overflow:auto;z-index:99999';
  box.textContent = '[Mount error]\n' + (err && err.stack || err && err.message || err);
  document.body.appendChild(box);
  throw err;
}
</script>
</body>
</html>
